version: "3.9"

services:
  task-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: task-manager-api:local
    container_name: task-manager-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
